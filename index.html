<!DOCTYPE html>
<html lang="pt-mz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Master PRO v6</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #030712; --card: #111827; --text: #f8fafc; --sub: #94a3b8;
            --p: #3b82f6; --s: #10b981; --d: #ef4444; --w: #f59e0b; --v: #8b5cf6;
            --glass: rgba(255, 255, 255, 0.03);
            --neon-p: 0 0 15px rgba(37, 99, 235, 0.4);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #030712); 
            color: var(--text); margin: 0; min-height: 100vh; display: flex; align-items: center; padding: 10px;
        }

        .app { 
            max-width: 400px; width: 100%; margin: auto; 
            background: var(--card); padding: 30px; border-radius: 40px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative; overflow: hidden;
        }

        /* Efeito de Luz no Fundo */
        .app::before {
            content: ''; position: absolute; top: -50px; left: -50px; width: 150px; height: 150px;
            background: var(--p); filter: blur(80px); opacity: 0.2; z-index: 0;
        }

        .header-ui { display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 1; }

        /* Badge Pro */
        .badge { font-size: 10px; padding: 6px 14px; border-radius: 50px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .badge-normal { background: var(--glass); color: var(--sub); border: 1px solid rgba(255,255,255,0.1); }
        .badge-pro { background: linear-gradient(90deg, #f59e0b, #ec4899); color: white; box-shadow: var(--neon-p); }

        /* Visor de Saldo */
        .balance-container { text-align: center; margin: 30px 0; position: relative; }
        .balance { font-size: 38px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Dashboard Chart */
        .chart-wrapper { width: 180px; margin: 0 auto; position: relative; }
        
        /* Botões */
        .section-label { font-size: 11px; font-weight: 700; color: var(--sub); margin: 20px 0 10px 5px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        button { 
            padding: 16px; border: none; border-radius: 20px; font-weight: 700; color: white; 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 13px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:active { transform: scale(0.95); }

        .b-gan { background: #059669; box-shadow: 0 4px 15px rgba(5, 150, 105, 0.3); }
        .b-per { background: #dc2626; box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3); }
        .b-emp { background: #2563eb; }
        .b-inv { background: #7c3aed; }
        .b-dev { background: #d97706; }
        .b-gas { background: #4b5563; }
        
        /* Reset Button Especial */
        .btn-reset { 
            background: var(--glass); border: 1px solid rgba(239, 68, 68, 0.2); 
            color: #ef4444; width: 100%; margin-top: 15px; 
        }

        /* Input Customizado */
        input { 
            width: 100%; padding: 15px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; background: rgba(0,0,0,0.2); color: white; box-sizing: border-box;
        }

        /* Lista de Histórico */
        .list-container { background: var(--glass); border-radius: 24px; padding: 5px; max-height: 250px; overflow-y: auto; }
        .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .hist-title { font-size: 13px; font-weight: 600; }
        .hist-desc { font-size: 10px; color: var(--sub); }

        /* Modais */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter: blur(12px); align-items:center; justify-content:center; z-index: 1000; }
        .m-content { background: var(--card); width: 85%; max-width: 320px; padding: 30px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div id="login-screen" class="app" style="text-align: center; z-index: 10;">
    <div style="font-size: 40px; margin-bottom: 10px;">💎</div>
    <h2 style="font-weight: 800; margin: 0;">F-Master PRO</h2>
    <p style="color: var(--sub); font-size: 13px; margin-bottom: 30px;">Painel Financeiro Inteligente</p>
    <input type="number" id="login-phone" placeholder="Seu número (8x...)">
    <button class="b-gan" style="width: 100%;" onclick="logar()">ENTRAR NO SISTEMA</button>
</div>

<div id="main-app" class="app" style="display:none;">
    <div class="header-ui">
        <div id="status-tag" class="badge badge-normal">Nível Básico</div>
        <div style="font-weight: 800; font-size: 12px; color: var(--p);">v6.0</div>
    </div>

    <div class="balance-container">
        <div class="chart-wrapper">
            <canvas id="myChart"></canvas>
        </div>
        <div style="margin-top: -20px;">
            <span style="font-size: 11px; color: var(--sub); font-weight: 700;">DISPONÍVEL</span><br>
            <span class="balance" id="topo-val">0 MT</span>
        </div>
    </div>

    <div class="section-label">Operações Rápidas</div>
    <div class="btn-grid">
        <button class="b-gan" onclick="adicionar('gan', 'Ganho')"><span>↑</span> Ganho</button>
        <button class="b-per" onclick="adicionar('per', 'Perda')"><span>↓</span> Gasto</button>
    </div>

    <div id="pro-features" style="display: none;">
        <div class="section-label">Gestão Avançada</div>
        <div class="btn-grid">
            <button class="b-emp" onclick="adicionar('emp', 'Empréstimo')">🏦 Emprést.</button>
            <button class="b-dev" onclick="abrirDevolucao()">💸 Devolução</button>
            <button class="b-inv" onclick="adicionar('inv', 'Investimento')">📈 Invest.</button>
            <button class="b-gas" onclick="adicionar('gas', 'Gasto Extra')">🛒 Outros</button>
        </div>

        <div class="section-label">Histórico Realtime</div>
        <div class="list-container" id="lista-detalhes"></div>
        
        <button style="width:100%; background: var(--glass); margin-top:15px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1);" onclick="gerarPDF()">📄 Exportar Relatório</button>
        
        <button class="btn-reset" onclick="resetSistema()">⚠️ Resetar Sistema (0000)</button>
    </div>

    <button id="btn-atv" style="width:100%; background: linear-gradient(90deg, #4f46e5, #9333ea); margin-top: 25px;" onclick="abrirModalAtv()">✨ DESBLOQUEAR PRO</button>

    <button style="background:none; color: var(--sub); font-size: 11px; margin-top: 20px; width:100%;" onclick="location.reload()">Desconectar</button>
</div>

<div id="modal-atv" class="modal">
    <div class="m-content">
        <h3>Ativação PRO</h3>
        <input type="text" id="cod-input" placeholder="Código de 4 Letras">
        <button class="b-gan" style="width: 100%;" onclick="confirmarCod()">ATIVAR AGORA</button>
        <button style="background:none; color:var(--sub); font-size: 12px; margin-top: 15px;" onclick="fecharModais()">FECHAR</button>
    </div>
</div>

<div id="modal-dev" class="modal">
    <div class="m-content">
        <h3>Liquidar</h3>
        <select id="select-emp" style="width:100%; padding:10px; border-radius:10px; margin-bottom:10px;"></select>
        <input type="number" id="dev-val" placeholder="Valor MT">
        <button class="b-dev" style="width: 100%;" onclick="processarDevolucao()">CONFIRMAR PAGAMENTO</button>
        <button style="background:none; color:var(--sub); font-size: 12px; margin-top: 10px;" onclick="fecharModais()">VOLTAR</button>
    </div>
</div>

<script>
    let tel = ""; let db = {}; let chart;

    function logar() {
        tel = document.getElementById('login-phone').value;
        if(tel.length < 8) return alert("Número inválido");
        db = JSON.parse(localStorage.getItem("v6_"+tel)) || { 
            emp:0, gan:0, per:0, inv:0, gas:0, pro:false, log:[], dividas:[] 
        };
        document.getElementById('login-screen').style.display='none';
        document.getElementById('main-app').style.display='block';
        initChart();
        refresh();
    }

    function initChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Emp','Gan','Per','Inv','Gas'],
                datasets: [{ 
                    data: [db.emp, db.gan, db.per, db.inv, db.gas], 
                    backgroundColor: ['#2563eb','#10b981','#ef4444','#8b5cf6','#4b5563'], 
                    borderWidth: 0, cutout: '85%'
                }]
            },
            options: { plugins:{legend:{display:false}}, animation: { animateScale: true } }
        });
    }

    function refresh() {
        const saldo = (db.gan + db.emp) - (db.per + db.inv + db.gas);
        document.getElementById('topo-val').innerText = saldo.toLocaleString() + " MT";
        
        chart.data.datasets[0].data = [db.emp, db.gan, db.per, db.inv, db.gas];
        chart.update();

        if(db.pro) {
            document.getElementById('status-tag').className = "badge badge-pro";
            document.getElementById('status-tag').innerText = "Premium PRO";
            document.getElementById('btn-atv').style.display = "none";
            document.getElementById('pro-features').style.display = "block";
            
            const lista = document.getElementById('lista-detalhes');
            lista.innerHTML = db.log.slice(-10).map(i => `
                <div class="hist-item">
                    <div class="hist-info">
                        <span class="hist-title">${i.t}</span><br>
                        <span class="hist-desc">${i.d}</span>
                    </div>
                    <span style="font-weight:800; color:${(i.t=='Ganho'||i.t=='Empréstimo')?'#10b981':'#ef4444'}">${i.v} MT</span>
                </div>
            `).reverse().join('');
        }
        localStorage.setItem("v6_"+tel, JSON.stringify(db));
    }

    function adicionar(key, nome) {
        const valor = parseFloat(prompt(`Valor de ${nome}:`));
        if(!valor || isNaN(valor)) return;
        const desc = prompt(`Referência:`) || "Sem nota";

        db[key] += valor;
        db.log.push({ t: nome, v: valor, d: desc, time: new Date().toLocaleTimeString() });

        if(key === 'emp') db.dividas.push({ id: Date.now(), desc: desc, total: valor, atual: valor });
        refresh();
    }

    // FUNÇÃO RESET PEDIDA
    function resetSistema() {
        const cod = prompt("CUIDADO: Isso apagará TODOS os dados. Digite o código de confirmação (0000):");
        if(cod === "0000") {
            db = { emp:0, gan:0, per:0, inv:0, gas:0, pro:true, log:[], dividas:[] };
            alert("Sistema limpo com sucesso!");
            refresh();
        } else {
            alert("Código incorreto. Ação cancelada.");
        }
    }

    function abrirDevolucao() {
        const select = document.getElementById('select-emp');
        const dividasAtivas = db.dividas.filter(d => d.atual > 0);
        if(dividasAtivas.length === 0) return alert("Sem dívidas pendentes.");
        select.innerHTML = dividasAtivas.map(d => `<option value="${d.id}">${d.desc} (${d.atual} MT)</option>`).join('');
        document.getElementById('modal-dev').style.display='flex';
    }

    function processarDevolucao() {
        const id = document.getElementById('select-emp').value;
        const valor = parseFloat(document.getElementById('dev-val').value);
        if(!valor || valor <= 0) return;
        const div = db.dividas.find(d => d.id == id);
        if(valor > div.atual) return alert("Valor excede a dívida!");
        
        div.atual -= valor;
        db.gas += valor;
        db.log.push({ t: 'Pagamento', v: valor, d: `Dívida: ${div.desc}`, time: new Date().toLocaleTimeString() });
        fecharModais(); refresh();
    }

    function abrirModalAtv() { document.getElementById('modal-atv').style.display='flex'; }
    function fecharModais() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    
    function confirmarCod() {
        const input = document.getElementById('cod-input').value.toUpperCase();
        const segredo = Array.from(tel.slice(-4)).map(n => "ABCDEFGHIJ"[n]).join('');
        if(input === segredo) { db.pro = true; fecharModais(); refresh(); } else { alert("Código Inválido"); }
    }

    function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("EXTRATO FINANCEIRO MASTER", 20, 20);
        let y = 40;
        db.log.forEach(l => { doc.text(`${l.t}: ${l.v} MT - ${l.d}`, 20, y); y+=10; });
        doc.save("extrato.pdf");
    }
</script>
</body>
</html>
